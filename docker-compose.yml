services:
  postgres:
    image: postgres:16-alpine
    container_name: rozgrywki-ligowe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rozgrywki_ligowe
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rozgrywki_ligowe"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: rozgrywki-ligowe-backend
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rozgrywki_ligowe
      CORS_ORIGIN: http://localhost:4200
      BODY_LIMIT_BYTES: 1048576
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./database:/database
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
